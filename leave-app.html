<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yonasindo Cuti APPS — Sistem Pengajuan Cuti di Yonasindo</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #111827;
    --bg3: #1a2235;
    --card: #131c2e;
    --border: #1e2d45;
    --border2: #253554;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --accent-glow: rgba(59,130,246,0.15);
    --green: #10b981;
    --green-glow: rgba(16,185,129,0.15);
    --red: #ef4444;
    --red-glow: rgba(239,68,68,0.15);
    --yellow: #f59e0b;
    --yellow-glow: rgba(245,158,11,0.15);
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRID BACKGROUND ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ══════════════════════════
     LOGIN SCREEN
  ══════════════════════════ */
  #loginScreen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }

  .login-wrap {
    width: 420px;
    animation: fadeUp .5s ease both;
  }

  .login-logo {
    text-align: center;
    margin-bottom: 40px;
  }

  .login-logo .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 0 30px rgba(59,130,246,0.4);
  }

  .logo-text {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent2); }

  .login-subtitle {
    color: var(--text3);
    font-size: 13px;
    margin-top: 6px;
    font-family: var(--mono);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.5);
  }

  .login-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg2);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }

  .login-tab {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--text3);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }

  .login-tab.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px rgba(59,130,246,0.3);
  }

  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 7px;
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .form-input {
    width: 100%;
    padding: 11px 14px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    outline: none;
    transition: all .2s;
  }

  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    margin-top: 8px;
    box-shadow: 0 4px 20px rgba(59,130,246,0.3);
  }

  .btn-primary:hover {
    background: #2563eb;
    transform: translateY(-1px);
    box-shadow: 0 6px 25px rgba(59,130,246,0.4);
  }

  .login-hint {
    margin-top: 20px;
    padding: 12px;
    background: var(--bg2);
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .login-hint-title {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 8px;
  }

  .hint-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 4px;
  }

  .hint-row span:last-child {
    font-family: var(--mono);
    color: var(--accent2);
  }

  .error-msg {
    color: var(--red);
    font-size: 12px;
    margin-top: 10px;
    display: none;
  }

  /* ══════════════════════════
     APP LAYOUT
  ══════════════════════════ */
  #appScreen { display: none; min-height: 100vh; }

  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 240px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 50;
  }

  .sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sidebar-logo {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
    box-shadow: 0 0 15px rgba(59,130,246,0.3);
  }

  .sidebar-brand {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -.3px;
  }

  .sidebar-brand span { color: var(--accent2); }

  .sidebar-nav {
    flex: 1;
    padding: 16px 12px;
    overflow-y: auto;
  }

  .nav-section-title {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0 8px;
    margin-bottom: 6px;
    margin-top: 16px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    color: var(--text2);
    font-size: 13.5px;
    font-weight: 500;
    transition: all .2s;
    margin-bottom: 2px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover { background: var(--bg3); color: var(--text); }

  .nav-item.active {
    background: var(--accent-glow);
    color: var(--accent2);
    border: 1px solid rgba(59,130,246,0.2);
  }

  .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .nav-badge {
    margin-left: auto;
    background: var(--red);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 999px;
    font-family: var(--mono);
  }

  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid var(--border);
  }

  .user-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: var(--bg2);
    border-radius: 10px;
    cursor: pointer;
  }

  .user-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-role { font-size: 11px; color: var(--text3); font-family: var(--mono); }

  .logout-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 16px;
    transition: color .2s;
  }

  .logout-btn:hover { color: var(--red); }

  /* ── MAIN CONTENT ── */
  .main {
    margin-left: 240px;
    padding: 32px;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  .page { display: none; animation: fadeUp .3s ease both; }
  .page.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .page-header {
    margin-bottom: 28px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .page-title { font-size: 24px; font-weight: 700; letter-spacing: -.5px; }
  .page-sub { font-size: 13px; color: var(--text3); margin-top: 4px; font-family: var(--mono); }

  /* ── STATS CARDS ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    transition: all .2s;
  }

  .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }

  .stat-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 10px;
  }

  .stat-value {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-desc { font-size: 12px; color: var(--text3); }

  .stat-blue .stat-value { color: var(--accent2); }
  .stat-green .stat-value { color: var(--green); }
  .stat-yellow .stat-value { color: var(--yellow); }
  .stat-red .stat-value { color: var(--red); }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .card-title { font-size: 15px; font-weight: 600; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }

  th {
    text-align: left;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  td {
    padding: 13px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text2);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); color: var(--text); }

  /* ── BADGE ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
    white-space: nowrap;
  }

  .badge::before { content: '●'; font-size: 7px; }

  .badge-pending { background: var(--yellow-glow); color: var(--yellow); }
  .badge-approved { background: var(--green-glow); color: var(--green); }
  .badge-rejected { background: var(--red-glow); color: var(--red); }
  .badge-blue { background: var(--accent-glow); color: var(--accent2); }

  /* ── BUTTONS ── */
  .btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .btn-accent { background: var(--accent); color: #fff; box-shadow: 0 2px 10px rgba(59,130,246,0.3); }
  .btn-accent:hover { background: #2563eb; transform: translateY(-1px); }
  .btn-green { background: var(--green-glow); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .btn-green:hover { background: rgba(16,185,129,0.25); }
  .btn-red { background: var(--red-glow); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .btn-red:hover { background: rgba(239,68,68,0.25); }
  .btn-ghost { background: var(--bg2); color: var(--text2); border: 1px solid var(--border2); }
  .btn-ghost:hover { background: var(--bg3); color: var(--text); }

  /* ── FORM ── */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group-2 { margin-bottom: 16px; }
  .form-label-2 { display: block; font-size: 12px; font-family: var(--mono); color: var(--text2); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; }
  .form-input-2 {
    width: 100%;
    padding: 10px 13px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 9px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13.5px;
    outline: none;
    transition: all .2s;
  }
  .form-input-2:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  textarea.form-input-2 { resize: vertical; min-height: 90px; }
  select.form-input-2 { cursor: pointer; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    animation: fadeUp .25s ease both;
  }

  .modal-header {
    padding: 22px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title { font-size: 16px; font-weight: 600; }

  .modal-close {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 20px; line-height: 1;
    transition: color .2s;
  }

  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 24px; }

  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* ── SISA CUTI ── */
  .leave-quota {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 22px;
  }

  .quota-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }

  .quota-num {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -1px;
    color: var(--accent2);
  }

  .quota-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  /* ── DETAIL VIEW ── */
  .detail-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
  }

  .detail-row:last-child { border-bottom: none; }

  .detail-key {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .4px;
    width: 120px;
    flex-shrink: 0;
    padding-top: 1px;
  }

  .detail-val { font-size: 13.5px; color: var(--text); }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--text3);
  }

  .empty-state .es-icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state .es-text { font-size: 14px; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 13.5px;
    display: none;
    align-items: center;
    gap: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    min-width: 260px;
    animation: slideIn .3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .toast-icon { font-size: 18px; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg2);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 20px;
    width: fit-content;
  }

  .tab-btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text3);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }

  .tab-btn.active {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 0 15px rgba(59,130,246,0.25);
  }

  /* ── CALENDAR MINI ── */
  .mini-cal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }

  .cal-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }

  .cal-month { font-size: 13px; font-weight: 600; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    text-align: center;
  }

  .cal-day-name {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    padding: 4px;
  }

  .cal-day {
    font-size: 12px;
    padding: 6px 4px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text2);
    transition: all .15s;
  }

  .cal-day:hover { background: var(--border2); }
  .cal-day.today { background: var(--accent-glow); color: var(--accent2); font-weight: 600; }
  .cal-day.has-leave { background: var(--yellow-glow); color: var(--yellow); }
  .cal-day.approved-leave { background: var(--green-glow); color: var(--green); }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .main { margin-left: 0; padding: 20px; }
    .form-row { grid-template-columns: 1fr; }
    .leave-quota { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="logo-mark">
        <div class="logo-icon">📋</div>
        <div>
          <div class="logo-text">Yonasindo<span>Cuti</span></div>
        </div>
      </div>
      <div class="login-subtitle">Sistem Pengajuan Cuti Karyawan</div>
    </div>

    <div class="login-card">
      <div class="login-tabs">
        <button class="login-tab active" onclick="setLoginTab('karyawan')">👤 Karyawan</button>
        <button class="login-tab" onclick="setLoginTab('admin')">🛡️ Admin</button>
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" id="loginUser" placeholder="Masukkan username">
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="loginPass" placeholder="Masukkan password">
      </div>

      <div class="error-msg" id="loginError">❌ Username atau password salah.</div>

      <button class="btn-primary" onclick="doLogin()">Masuk →</button>

      <div class="login-hint">
        <div class="login-hint-title">Jika kamu mengalami kendala, silahkan hubuungi</div>
        <div class="hint-row"><span>Elvari</span><span>(+62) 819-0637-4205</span></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="appScreen">
  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">📋</div>

// ── Computed ──
function getCutiByUser(uid) { return state.cuti.filter(c => c.userId === uid); }
function getPendingCuti() { return state.cuti.filter(c => c.status === 'pending'); }
function getUserById(id) { return state.users.find(u => u.id === id); }
function usedCuti(uid) {
  return state.cuti
    .filter(c => c.userId === uid && c.status === 'approved')
    .reduce((s, c) => s + c.hari, 0);
}
function sisaCuti(uid) {
  const u = getUserById(uid);
  return Math.max(0, u.jatah - usedCuti(uid));
}

// ══════════════════════════
// AUTH
// ══════════════════════════
let loginRole = 'karyawan';

function setLoginTab(role) {
  loginRole = role;
  document.querySelectorAll('.login-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && role === 'karyawan') || (i === 1 && role === 'admin'));
  });
  document.getElementById('loginError').style.display = 'none';
}

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  const user = state.users.find(x => x.username === u && x.password === p && x.role === loginRole);
  if (!user) {
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  state.currentUser = user;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  initApp();
}

function doLogout() {
  state.currentUser = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}

// ══════════════════════════
// APP INIT
// ══════════════════════════

  const u = state.currentUser;

function buildPages() {
  const u = state.currentUser;

    main.innerHTML = `
      ${pageDashboardAdmin()}

    main.innerHTML = `
      ${pageDashboardKaryawan()}
      ${pageRiwayat()}

    `;
  }
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pg = document.getElementById('page-' + id);
  if (pg) pg.classList.add('active');

  document.querySelectorAll('.nav-item').forEach(n => {
    const active = n.getAttribute('onclick')?.includes(`'${id}'`);
    n.classList.toggle('active', !!active);
  });
}

// PAGES — ADMIN
// ══════════════════════════

function buildAdminCutiRows(filter) {

      <td>${user?.dept}</td>

// ══════════════════════════
// CALENDAR RENDER
// ══════════════════════════
function renderCalendar() {
  const el = document.getElementById('calendarWidget');
  if (!el) return;

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const u = state.currentUser;
  const myCuti = getCutiByUser(u.id);

  function getDateStatus(d) {
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    for (const c of myCuti) {
      if (dateStr >= c.mulai && dateStr <= c.selesai) return c.status;
    }
    return null;
  }

  const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
  const days = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];

  let html = `<div class="mini-cal">
    <div class="cal-head">
      <div class="cal-month">${months[month]} ${year}</div>
    </div>
    <div class="cal-grid">
      ${days.map(d => `<div class="cal-day-name">${d}</div>`).join('')}`;

  for (let i = 0; i < (firstDay === 0 ? 6 : firstDay - 1); i++) {
    html += `<div></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === now.getDate();
    const status = getDateStatus(d);
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (status === 'pending') cls += ' has-leave';
    if (status === 'approved') cls += ' approved-leave';
    html += `<div class="${cls}">${d}</div>`;
  }

  html += `</div></div>`;
  el.innerHTML = html;
}

// ══════════════════════════
// ACTIONS
// ══════════════════════════
function submitCuti() {
  const jenis = document.getElementById('inputJenis').value;
  const mulai = document.getElementById('inputMulai').value;
  const selesai = document.getElementById('inputSelesai').value;
  const alasan = document.getElementById('inputAlasan').value.trim();
  const kontak = document.getElementById('inputKontak').value.trim();

  if (!mulai || !selesai || !alasan || !kontak) {
    showToast('⚠️', 'Semua field wajib diisi!', 'warn');
    return;
  }

  if (mulai > selesai) {
    showToast('⚠️', 'Tanggal mulai tidak boleh setelah tanggal selesai!', 'warn');
    return;
  }

  const hari = hitungHari(mulai, selesai);
  const sisa = sisaCuti(state.currentUser.id);

  if (jenis === 'Cuti Tahunan' && hari > sisa) {
    showToast('⚠️', `Sisa cuti tahunan Anda hanya ${sisa} hari!`, 'warn');
    return;
  }

  const today = new Date().toISOString().split('T')[0];
  state.cuti.push({
    id: state.nextCutiId++,
    userId: state.currentUser.id,
    jenis, mulai, selesai, hari, alasan, kontak,
    status: 'pending',
    catatan: '',
    tgl: today,
  });

  closeModal('modalAjukan');
  clearForm();
  buildPages();
  showPage('riwayat');
  showToast('✅', 'Pengajuan cuti berhasil dikirim!', 'success');
}

function approveReject(cutiId, action) {
  const cuti = state.cuti.find(c => c.id === cutiId);
  if (!cuti) return;
  cuti.status = action;
  closeModal('modalDetail');
  buildPages();
  showPage('semuaCuti');
  updateBadge();
  showToast(action === 'approved' ? '✅' : '❌', `Cuti ${action === 'approved' ? 'disetujui' : 'ditolak'}!`, action === 'approved' ? 'success' : 'error');
}

function showDetail(cutiId) {
  const c = state.cuti.find(x => x.id === cutiId);
  if (!c) return;
  const user = getUserById(c.userId);

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-row"><div class="detail-key">Karyawan</div><div class="detail-val">${user?.name}</div></div>
    <div class="detail-row"><div class="detail-key">Departemen</div><div class="detail-val">${user?.dept}</div></div>
    <div class="detail-row"><div class="detail-key">Jenis Cuti</div><div class="detail-val">${c.jenis}</div></div>
    <div class="detail-row"><div class="detail-key">Tanggal Mulai</div><div class="detail-val" style="font-family:var(--mono)">${c.mulai}</div></div>
    <div class="detail-row"><div class="detail-key">Tanggal Selesai</div><div class="detail-val" style="font-family:var(--mono)">${c.selesai}</div></div>
    <div class="detail-row"><div class="detail-key">Durasi</div><div class="detail-val">${c.hari} hari kerja</div></div>
    <div class="detail-row"><div class="detail-key">Alasan</div><div class="detail-val">${c.alasan}</div></div>
    <div class="detail-row"><div class="detail-key">Kontak</div><div class="detail-val" style="font-family:var(--mono)">${c.kontak}</div></div>
    <div class="detail-row"><div class="detail-key">Tanggal Ajuan</div><div class="detail-val" style="font-family:var(--mono)">${c.tgl}</div></div>
    <div class="detail-row"><div class="detail-key">Status</div><div class="detail-val"><span class="badge badge-${c.status}">${statusLabel(c.status)}</span></div></div>
    ${c.catatan ? `<div class="detail-row"><div class="detail-key">Catatan</div><div class="detail-val">${c.catatan}</div></div>` : ''}
  `;

  let footer = `<button class="btn btn-ghost" onclick="closeModal('modalDetail')">Tutup</button>`;
  if (state.currentUser.role === 'admin' && c.status === 'pending') {
    footer = `
      <button class="btn btn-ghost" onclick="closeModal('modalDetail')">Tutup</button>
      <button class="btn btn-red" onclick="approveReject(${c.id},'rejected')">✕ Tolak</button>
      <button class="btn btn-green" onclick="approveReject(${c.id},'approved')">✓ Setujui</button>
    `;
  }
  document.getElementById('detailFooter').innerHTML = footer;
  openModal('modalDetail');
}

function submitKaryawan() {
  const nama = document.getElementById('tkNama').value.trim();
  const username = document.getElementById('tkUsername').value.trim();
  const password = document.getElementById('tkPassword').value.trim();
  const dept = document.getElementById('tkDept').value;
  const jabatan = document.getElementById('tkJabatan').value.trim();
  const jatah = parseInt(document.getElementById('tkJatah').value) || 12;

  if (!nama || !username || !password || !jabatan) {
    showToast('⚠️', 'Semua field wajib diisi!', 'warn');
    return;
  }

  if (state.users.find(u => u.username === username)) {
    showToast('⚠️', 'Username sudah digunakan!', 'warn');
    return;
  }

  const words = nama.trim().split(' ');
  const avatar = (words[0][0] + (words[1]?.[0] || '')).toUpperCase();

  state.users.push({
    id: state.nextUserId++,
    name: nama, username, password,
    role: 'karyawan',
    dept, jabatan, jatah, avatar,
  });

  closeModal('modalTambahKaryawan');
  buildPages();
  showPage('karyawan');
  showToast('✅', `Karyawan ${nama} berhasil ditambahkan!`, 'success');
}

// ══════════════════════════
// HELPERS
// ══════════════════════════
function hitungHari(mulai, selesai) {
  const d1 = new Date(mulai), d2 = new Date(selesai);
  let count = 0;
  let cur = new Date(d1);
  while (cur <= d2) {
    const day = cur.getDay();
    if (day !== 0 && day !== 6) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
}

function statusLabel(s) {
  return { pending: 'Menunggu', approved: 'Disetujui', rejected: 'Ditolak' }[s] || s;
}

function updateBadge() {
  const el = document.getElementById('badgePending');
  if (el) el.textContent = getPendingCuti().length || '';
}

function showToast(icon, msg, type) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastMsg').textContent = msg;
  t.style.borderColor = type === 'success' ? 'rgba(16,185,129,0.3)' : type === 'error' ? 'rgba(239,68,68,0.3)' : 'rgba(245,158,11,0.3)';
  t.style.display = 'flex';
  setTimeout(() => t.style.display = 'none', 3000);
}

function clearForm() {
  ['inputJenis', 'inputMulai', 'inputSelesai', 'inputHari', 'inputAlasan', 'inputKontak'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ── Auto-hitung hari ──
document.addEventListener('change', function(e) {
  if (e.target.id === 'inputMulai' || e.target.id === 'inputSelesai') {
    const m = document.getElementById('inputMulai').value;
    const s = document.getElementById('inputSelesai').value;
    if (m && s && m <= s) {
      document.getElementById('inputHari').value = hitungHari(m, s) + ' hari kerja';
    }
  }
});

// ── Re-render calendar on page show ──
const _origShowPage = showPage;
window.showPage = function(id) {
  _origShowPage(id);
  if (id === 'kalender') setTimeout(renderCalendar, 50);
};

// ── Close modal on overlay click ──
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => {
    if (e.target === o) o.classList.remove('open');
  });
});
</script>
